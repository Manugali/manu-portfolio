name: LocalLaunch CI

on:
  push:
    paths:
      - "local-launch-ai/**"
  pull_request:
    paths:
      - "local-launch-ai/**"

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: local-launch-ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: local-launch-ai/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
